<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ✅ 폰트 */
@font-face {
    font-family: 'Paperozi';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
    font-weight: 400;
}
@font-face {
    font-family: 'Paperozi';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');
    font-weight: 600;
}
@font-face {
    font-family: 'Paperozi';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
    font-weight: 700;
}

/* 기본 */
body {
  margin:0;
  font-family: 'Paperozi', sans-serif;
  background:#fff5f7;
}

.container {
  max-width:700px;
  margin:auto;
  padding:15px;
}

.card {
  background:white;
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 4px 12px rgba(255,105,135,0.15);
}

/* 제목 */
.title, summary {
  font-weight:700;
  color:#ff4d6d;
  font-size:18px;
  cursor:pointer;
}

/* 슬롯 */
.slot {
  background:#fff0f3;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  line-height:1.8;
}

.available { color:#ff4d6d; font-weight:600; }
.closed { color:#bbb; text-decoration:line-through; }

/* 버튼 */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button.active {
  background:#ff8fa3;
}

/* 이미지 */
img {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* 입력창 */
textarea {
  width:100%;
  height:320px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ffd6df;
  background:#fffafb;
  font-family:'Paperozi', sans-serif;
  font-size:14px;
  line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<!-- 슬롯 -->
<div class="card">
<div class="title">📅 작업 슬롯 현황</div>
<div class="slot">
4월 : <span class="available">가능</span> / <span class="closed">마감</span><br>
5월 : <span class="available">가능</span> / <span class="closed">마감</span><br>
6월 : <span class="available">가능</span> / <span class="closed">마감</span><br>
7월 : <span class="available">가능</span> / <span class="closed">마감</span><br>
8월 : <span class="available">가능</span> / <span class="closed">마감</span><br>
9월 : <span class="available">가능</span> / <span class="closed">마감</span>
</div>
</div>

<!-- 가격표 -->
<details class="card">
<summary>💰 가격표</summary>
<div style="margin-top:10px;">
기본 일러스트 : 00,000원<br>
Live2D 모델 : 000,000원<br>
표정 추가 : +00,000원
</div>
</details>

<!-- 샘플 -->
<details class="card">
<summary>🖼 실제 커미션 샘플</summary>
<img src="sample1.jpg">
<img src="sample2.jpg">
</details>

<!-- 표정 -->
<details class="card">
<summary>🙂 기본 표정</summary>
<img src="face1.jpg">
</details>

<!-- 협업 -->
<details class="card">
<summary>🤝 협업 작가</summary>
리깅 : ○○○
</details>

<!-- 그림체 -->
<details class="card">
<summary>🎨 그림체 참고</summary>
<img src="style1.jpg">
</details>

<!-- 신청 -->
<details class="card">
<summary>📄 신청 양식</summary>

<textarea id="inputText">
해당하는 부분만 적어주시면 됩니다. 괄호 안의 글씨는 삭제하고 작성해 주세요!

1. 신청자명 / 활동명 :

2. 채널 / 방송국 :

3. 사용 목적 :

4. 캐릭터 자료 :

5. 협업 리깅 작가 :

6. 추가 옵션

7. 표정 선택

8. 작가에게 전할 말
</textarea>

<button onclick="copyText()">📋 작성한 양식 복사하기</button>

</details>

</div>

<script>
function copyText() {
  const text = document.getElementById("inputText").value;
  navigator.clipboard.writeText(text);
  alert("복사됨!");
}
</script>

</body>
</html>
